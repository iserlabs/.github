<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Iser Labs monogram">
  <!-- Iser Labs monogram (ISR-01): chunky forward slash in a square frame with TL/BR registration ticks.
       Reconstructed from brand.css .aperture. Color = ink #0F0E0C; transparent background.
       Frame drawn as four filled bars (universal renderer support). -->
  <g fill="#0F0E0C">
    <!-- square frame (four hairline bars), outer edge 96..416, thickness 5 -->
    <rect x="96"  y="96"  width="320" height="5"/>
    <rect x="96"  y="411" width="320" height="5"/>
    <rect x="96"  y="96"  width="5"   height="320"/>
    <rect x="411" y="96"  width="5"   height="320"/>
    <!-- chunky forward slash: 22% width, 80% height, skewX(-22deg) about center -->
    <polygon points="272.5,128 342.9,128 239.5,384 169.1,384"/>
    <!-- top-left registration tick -->
    <rect x="108.8" y="106.3" width="44.8" height="5"/>
    <rect x="106.3" y="108.8" width="5" height="44.8"/>
    <!-- bottom-right registration tick -->
    <rect x="358.4" y="400.7" width="44.8" height="5"/>
    <rect x="400.7" y="358.4" width="5" height="44.8"/>
  </g>
</svg>
