<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1501 312" width="1501" height="312" role="img" aria-label="Iser Labs">
  <!-- Iser Labs horizontal wordmark: monogram + Space Grotesk 500 + signal-amber period.
       Vector source for web use (loads the Google webfont). For GitHub READMEs use the PNGs
       (sandboxed SVG won't fetch external fonts). -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&amp;display=swap');
    .wm { font-family: 'Space Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif;
          font-weight: 500; font-size: 240px; letter-spacing: -7px; }
  </style>
  <!-- monogram: 0..512 mark scaled to 221px, vertically centered -->
  <g transform="translate(50,45.5) scale(0.431640625)" fill="#0F0E0C">
    <rect x="96"  y="96"  width="320" height="5"/>
    <rect x="96"  y="411" width="320" height="5"/>
    <rect x="96"  y="96"  width="5"   height="320"/>
    <rect x="411" y="96"  width="5"   height="320"/>
    <polygon points="272.5,128 342.9,128 239.5,384 169.1,384"/>
    <rect x="108.8" y="106.3" width="44.8" height="5"/>
    <rect x="106.3" y="108.8" width="5" height="44.8"/>
    <rect x="358.4" y="400.7" width="44.8" height="5"/>
    <rect x="400.7" y="358.4" width="5" height="44.8"/>
  </g>
  <text x="353" y="240" class="wm" fill="#0F0E0C">Iser Labs<tspan fill="#F26418">.</tspan></text>
</svg>
