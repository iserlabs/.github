<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Iser Labs — Brand Kit & Design System</title>
  <link rel="stylesheet" href="brand.css"/>
  <style>
    html, body { margin: 0; padding: 0; background: #e8e3d6; }
    body { font-family: var(--font-display, system-ui); }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Canvas + frames -->
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="frames/cover.jsx"></script>
  <script type="text/babel" src="frames/logo.jsx"></script>
  <script type="text/babel" src="frames/colors.jsx"></script>
  <script type="text/babel" src="frames/typography.jsx"></script>
  <script type="text/babel" src="frames/iconography.jsx"></script>
  <script type="text/babel" src="frames/components.jsx"></script>
  <script type="text/babel" src="frames/applications.jsx"></script>
  <script type="text/babel" src="frames/voice-motion.jsx"></script>
  <script type="text/babel" src="frames/index-page.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas>
          <DCSection id="essence" title="01 · Essence" subtitle="Who we are at a glance.">
            <DCArtboard id="cover" label="00 · Cover" width={1440} height={900}>
              <CoverFrame/>
            </DCArtboard>
            <DCArtboard id="index" label="08 · Index & colophon" width={1440} height={820}>
              <IndexFrame/>
            </DCArtboard>
          </DCSection>

          <DCSection id="identity" title="02 · Identity" subtitle="Monogram, wordmark, lockups.">
            <DCArtboard id="logo" label="01 · Logo system" width={1440} height={1000}>
              <LogoFrame/>
            </DCArtboard>
          </DCSection>

          <DCSection id="visual" title="03 · Visual language" subtitle="Color, type, icons, marks.">
            <DCArtboard id="color" label="02 · Color" width={1440} height={1000}>
              <ColorFrame/>
            </DCArtboard>
            <DCArtboard id="type" label="03 · Typography" width={1440} height={1180}>
              <TypeFrame/>
            </DCArtboard>
            <DCArtboard id="icons" label="04 · Iconography" width={1440} height={820}>
              <IconFrame/>
            </DCArtboard>
          </DCSection>

          <DCSection id="product" title="04 · Product" subtitle="Components, surfaces, patterns.">
            <DCArtboard id="components" label="05 · Components" width={1440} height={1100}>
              <ComponentsFrame/>
            </DCArtboard>
          </DCSection>

          <DCSection id="applications" title="05 · In the wild" subtitle="The system, put to work.">
            <DCArtboard id="apps" label="06 · Applications" width={1440} height={1100}>
              <ApplicationsFrame/>
            </DCArtboard>
          </DCSection>

          <DCSection id="operating" title="06 · Operating posture" subtitle="How it sounds. How it moves.">
            <DCArtboard id="voice" label="07 · Voice & motion" width={1440} height={900}>
              <VoiceMotionFrame/>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
